<!DOCTYPE html>
<html>

<head>
    <title>Mock Baseball Reference Page</title>
</head>

<body>

    <!-- Info block to determine position -->
    <div id="info">
        <p><strong>Position:</strong> Shortstop</p>
    </div>

    <!-- Career totals stats pullout -->
    <div class="stats_pullout">
        <div>
            <p>2024</p>
            <p>Career</p>
        </div>

        <div class="p1">
            <div>
                <span>WAR</span>
                <p>1.2</p>
                <p>71.3</p>
            </div>
            <div>
                <span>W</span>
                <p>0</p>
                <p>0</p>
            </div>
        </div>

        <div class="p2">
            <div>
                <span>AB</span>
                <p>100</p>
                <p>10000</p>
            </div>
        </div>

        <div class="p3">
            <div>
                <span>HR</span>
                <p>5</p>
                <p>260</p>
            </div>
        </div>
    </div>

    <!-- Yearly war batting table -->
    <div id="switcher_players_standard_batting">
        <table id="players_standard_batting">
            <tbody>
                <tr id="batting_standard.1995">
                    <th data-stat="year_id">1995</th>
                    <td data-stat="team_name_abbr">NYY</td>
                    <td data-stat="b_war">0.1</td>
                </tr>
                <tr id="batting_standard.1996">
                    <th data-stat="year_id">1996</th>
                    <td data-stat="team_name_abbr">NYY</td>
                    <td data-stat="b_war">3.3</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
