# deploy.yml

name: Build and Deploy Site

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *' # Every night at midnight

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # The Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test_requirements.txt

      - name: Run all project tests
        run: npm run test:all

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Generate sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          path-to-root: ./_site
          base-url-path: https://namethatyankeequiz.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          
  # The Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start local server for DAST
        run: python3 -m http.server 8001 --bind 127.0.0.1 --directory tests/fixtures/www &

      - name: Wait for server
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8001 > /dev/null; then
              echo "Server is up!"
              break
            fi
            sleep 1
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8001'
          issue_title: 'ZAP Security Report'

  # The Deploy job
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4