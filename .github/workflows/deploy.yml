# deploy.yml
#
# Required secrets:
#   GOOGLE_INDEXING_CREDENTIALS: GCP service account JSON key file
#     - Service account must have Indexing API enabled
#     - Service account email must be owner in Google Search Console
#     - Get from: https://console.cloud.google.com/iam-admin/serviceaccounts

name: Build and Deploy Site

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '10 7 * * *' # Every night at 12:10AM PT
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # The Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm' # add caching

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip' # add caching

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test_requirements.txt
          playwright install --with-deps chromium

      - name: Run all project tests
        run: npm run test:all

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          path-to-root: ./_site
          base-url-path: https://namethatyankeequiz.com/
          drop-html-extension: true
          exclude-paths: index.html docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site
          
  # The Security Scan Job
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start local server for DAST
        run: python3 -m http.server 8001 --bind 127.0.0.1 --directory tests/fixtures/www &

      - name: Wait for server
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8001 > /dev/null; then
              echo "Server is up!"
              break
            fi
            sleep 1
          done

      - name: Grant write permissions to ZAP
        run: chmod -R a+w .

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:8001'
          issue_title: 'ZAP Security Report'
          artifact_name: 'zap-scan-report'
          rules_file_name: '.zap/rules.tsv'

  # The Deploy job
  deploy:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    needs: [build, security-scan]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Download previous indexing state
        if: success()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: indexing-state
          path: .
          merge-multiple: false

      - name: Download Pages artifact for indexing
        if: success()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./_site

      - name: Extract Pages artifact
        if: success()
        continue-on-error: true
        run: |
          cd ./_site
          tar -xf artifact.tar
          rm artifact.tar
          ls -la

      - name: Write Google Indexing credentials
        if: success()
        continue-on-error: true
        env:
          CREDS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}
        run: printf "%s" "$CREDS" > /tmp/google-indexing-creds.json

      - name: Submit new URLs to Google Indexing API
        if: success()
        continue-on-error: true
        run: |
          pip install -r requirements.txt
          PYTHONPATH=./page-generator python -m indexing.submit_urls \
            --credentials /tmp/google-indexing-creds.json \
            --sitemap ./_site/sitemap.xml \
            --state-file .indexing_state.json

      - name: Write indexing state
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: indexing-state
          path: .indexing_state.json
          retention-days: 90
